<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1500" viewBox="0 0 1200 1500" role="img" aria-label="Fizyoterapi klinii">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8"/>
      <stop offset="50%" style="stop-color:#d1e9e6"/>
      <stop offset="100%" style="stop-color:#b8d4e3"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0d9488"/>
      <stop offset="100%" style="stop-color:#0f2744"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="1500" fill="url(#bg)"/>
  <!-- Abstract clinic shapes -->
  <circle cx="900" cy="400" r="200" fill="#0d9488" opacity="0.08"/>
  <circle cx="300" cy="1100" r="280" fill="#0f2744" opacity="0.06"/>
