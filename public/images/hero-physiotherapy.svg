  <rect x="350" y="650" width="500" height="120" rx="60" fill="#0f2744" opacity="0.12"/>
  <rect x="400" y="600" width="400" height="80" rx="12" fill="#0d9488" opacity="0.2"/>
  <!-- Person silhouette -->
  <ellipse cx="600" cy="580" rx="50" ry="50" fill="#0f2744" opacity="0.15"/>
  <rect x="560" y="620" width="80" height="100" rx="20" fill="#0f2744" opacity="0.12"/>
